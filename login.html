<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GpChat | Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
  <main class="auth-shell">
    <section class="auth-brand">
      <div class="orb orb-a"></div>
      <div class="orb orb-b"></div>
      <p class="eyebrow">Realtime communication</p>
      <h1>GpChat</h1>
      <p class="auth-copy">
        A premium chat workspace with blazing updates, polished experience, and fully synced conversations.
      </p>
      <ul class="feature-list">
        <li>Live message stream</li>
        <li>Account based access</li>
        <li>Responsive mobile first UI</li>
      </ul>
    </section>

    <section class="auth-card-wrap">
      <form class="auth-card" id="authForm">
        <h2>Welcome back</h2>
        <p id="authStatus" class="status-text">Sign in to continue.</p>

        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required>

        <label for="password">Password</label>
        <input type="password" id="password" placeholder="At least 6 characters" autocomplete="current-password" required>

        <div class="auth-actions">
          <button type="button" id="loginBtn" class="btn btn-primary">Login</button>
          <button type="button" id="signupBtn" class="btn btn-ghost">Create account</button>
        </div>
      </form>
    </section>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
